[mod-setting-description]
rabbasca-cap-bunnyhop-research=バニーホップの無限研究を削除し、ジャンプを衛星や近隣の惑星のみに制限する。
rabbasca-bunnyhop-force-naked=バニーホップ中のアイテム所持を不可能にし、ロケットサイロを使わない純粋な移動手段としての用途へ限定する。\nこの設定を有効にすると、ゲーム終盤までラバスカからアイテムを持ち出せなくなる。サイエンスパックの生産ラインをラバスカに構築する場合、またはラバスカ固有の技術を使わない場合にのみ有効化を推奨する。
rabbasca-bunnyhop-rabbasca-only=[item=bunnyhop-engine]をラバスカ以外の惑星で使用不能にする。
rabbasca-evolution-per-vault=ラバスカ固有の進化度（警戒レベル）を決定する係数。現在ハッキング中の保管庫の数にこの値を掛けたものがパーセンテージとして適用される。\n例えば2.5に設定した場合、10個の保管庫を同時にハッキングすると警戒レベルが25%になる。この数値は通常のゲームの進化度設定の影響を受けない。0に設定するとラバスカの進化システムが無効化される。\n\nゲーム内の警戒レベルは、新たなハッキングの開始時、または既存のハッキングの終了時にのみ再計算される。
rabbasca-show-alertness-ui=画面左上に現在の警戒レベルを示すUIを追加する。このインジケーターはラバスカの地表を表示している間のみ可視化される。\n設定の変更は、次回の警戒レベル更新時、または別の惑星の地表を表示した後に適用される。
rabbasca-surface-megawatts=ラバスカの電力網で使用可能な電力量。 
rabbasca-harene-easy-mode=__FLUID__harene__の製作には、異なる惑星での複数のステップが必要になる。この設定は、関連する一部のアイテムの地表条件を削除する。
rabbasca-no-extra-category=Factoriopediaと製作UIの独立したラバスカタブを削除し、アイテムとレシピを既存のカテゴリに移動する。
rabbasca-ears-local-only=有効化すると、E.A.R.S.搭載の建物はハレニック・エネルギーフィールドが存在する場所にしか建設できなくなる。バランス調整として、E.A.R.S. サブコアの製作時間が大幅に短縮される。\nエネルギーコンクリートは引き続きどの惑星にも設置可能。この設定はワープパイロンには影響しない。
rabbasca-bunnyhop-cooldown=この設定の変更は、その後に開始されたクールダウンにのみ適用され、進行中のクールダウンをリセットまたは変更することはない。

