[item-description]
rabbasca-turbofish=長期間エネルギーにさらされたため、非常に栄養価が高い。\n臭いのせいか栄養価のせいかは不明だが、確かに非常に速く走れるようになる。
harene-ears-core=大型の機械が周囲のハレニック・エネルギーフィールドから受電できるようにする謎の装置。\n対象の機械は[tile=rabbasca-energetic-concrete]または[tile=haronite-plate]の上に設置する必要がある。
harene-ears-subcore=小型の機械が周囲のハレニック・エネルギーフィールドから受電できるようにする謎の装置。\n対象の機械は[tile=rabbasca-energetic-concrete]または[tile=haronite-plate]の上に設置する必要がある。
rabbasca-energetic-concrete=[item=harene-ears-core]が放出するハレニック・エネルギーフィールドから電力を引き出すことを可能にする床材。
machining-assembler=組立機やその他の複雑な機械の組み立てに特化した組立機。
bunnyhop-engine=惑星間を直接移動するための装置。\n起動後、キャラクターが移動するとチャージされる。リモートビューを開くとチャージを中断できる。\n射程と重量制限は研究によって拡張可能。
vault-access-key=[entity=rabbasca-vault-spawner]に撃ち込んでハッキングする。
vault-security-key=[item=vault-access-key]の強化版。ハッキングがより速く、ハッキング試行時の耐久性も向上する。
rabbasca-hyperjuice=これを開発したとき、明らかに[item=rabbasca-protein-shake]を飲みすぎたようだ...\n個人用装備としても、[item=nutrients]の代替として機械に供給することもできる。
haronite-plate=極めて耐久性の高い素材。また、[item=space-platform-foundation]を覆う床材（[item=tile-upgrade-planner]を使用）でもあり、[item=harene-ears-core]がハレニック・エネルギーフィールドから電力を引き出すことを可能にする。
rabbasca-locate-stabilizer=まだ見つかっていない場合、約10%の確率で安定装置を特定する。それ以外の場合は、常に既存の安定装置の隣に[entity=rabbasca-warp-pylon]を作成する。
rabbasca-warp-sequence=[virtual-signal=rabbasca-warp-inventory]との間でアイテムを転送する。\n研究済みのテクノロジーに応じて、以下の処理を上から順に試行する:\n[recipe=rabbasca-warp-sequence-reverse]\n[recipe=rabbasca-warp-sequence-tile]\n[recipe=rabbasca-warp-sequence-building]\n[recipe=rabbasca-warp-sequence-upgrade]\n[recipe=rabbasca-warp-sequence-module]

