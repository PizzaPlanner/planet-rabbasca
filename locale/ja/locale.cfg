[tips-and-tricks-item-description]
rabbasca-briefing=[planet=rabbasca]の地表は広大な砂漠であり、所々に[entity=carotenoid-ore]が見つかる肥沃なエリアが存在します。[fluid=energetic-residue]の池には大量の[entity=rabbasca-turbofish]が生息しており、これを食べることで地形を素早く移動できます。\nこの衛星の[entity=rabbasca-energy-source]はある程度の電力を提供しますが、同時にすべての発電機、[item=solar-panel]、[item=accumulator]を無効化してしまいます。工場を拡張するには、機械の電力需要を満たす他の方法を見つける必要があります。ここに存在する[entity=rabbasca-vault-crafter]が、その解決策になるかもしれません。\nスペースプラットフォームと同様に、この場所の電気ネットワークは惑星全体で共有されています。[item=medium-electric-pole]は送電には不要ですが、現在のエネルギー状況を確認するために使用できます。
rabbasca-vaults=[entity=rabbasca-vault-crafter]は[planet=rabbasca]に点在する防衛施設であり、遠い昔の創造主によって蓄えられた物資が保管されています。[item=vault-access-key]でハッキングすることで一時的にアクセス権を得て、防衛機構を無効化できます。\nハッキング中の保管庫は、[item=carotenoid-ore]や[fluid=beta-carotene]を消費して内部のアイテムを排出させることができます。これにより、[item=iron-ore]、[item=copper-ore]、[item=calcite]、[item=sulfur]といった原材料を入手できるほか、[item=haronite]や[item=harene-ears-core]を入手する唯一の手段となります。\nボットの防衛機構は近くの軍事的脅威にのみ反応します。プレイヤーの工場を直接攻撃することはなく、近くで[entity=rabbascan-scrap]を採掘している掘削機であっても攻撃対象にはなりません。\n[entity=rabbasca-vault-console]の数が増えるごとにグローバル警戒レベルが上昇し、防衛が強化されるため、連続して保管庫を確保することが困難になります。
rabbasca-bunnyhop=[item=bunnyhop-engine]を使用すると、[entity=rocket-silo]を必要とせずに、[entity=character]が惑星間を直接ジャンプできるようになります。アイテムを持ち運ぶことも可能ですが、初期状態では最大重量とジャンプ距離が制限されており、さらなる研究が必要になります。\n[shortcut=activate-bunnyhop-engine]を使用して発射シーケンスを開始し、走り回ってエンジンをチャージします。重量オーバーの状態ではエンジンはチャージされません。\n[planet=fulgora]から[planet=aquilo]のような長距離のジャンプも可能ですが、これには[technology=bunnyhop-engine-4]の多大な研究が必要となります。
rabbasca-warp-inventory=アイテムを[entity=rabbasca-warp-uplink]に投入すると、[virtual-signal=rabbasca-warp-inventory]に移動します。[entity=rabbasca-warp-pylon]はこのインベントリを参照してアイテムを転送します。アイテムを[virtual-signal=rabbasca-warp-inventory]から取り出すには、ワープを利用して実体化させるしかありません。\n\n各[entity=rabbasca-warp-uplink]は要求チェストとして機能します。事前設定済みの物流セクションが備わっており、[virtual-signal=rabbasca-warp-inventory]内のすべてのアイテム数がマイナス値で設定されています。これにより、追加の物流セクションからの要求を通常の予備インベントリと同様に相殺できます。このグループは数ティックごとに更新されるため、[entity=constant-combinator]などの他の機械を接続してワープ・インベントリの内容を追跡することも可能です。\nワープ・インベントリは非常に大きいですが、無限ではありません。空きスロットの数は[virtual-signal=signal-black]で確認できます。

