[recipe-description]
rabbasca-extend-hack=[entity=rabbasca-vault-console]の耐久値の減少を大幅に遅らせ、ハッキング時間を延長する。\nハッキング終了時に[entity=rabbasca-vault-console]内の全アイテムが消滅するため、資源が無駄になる可能性があることに注意。
rabbasca-remote-warmup=研究済みのすべてのワープシーケンスのいずれかの実行を試行する。成功すると、以降の連続するワープが速くなる。\nパイロンでレシピが選択されていない状態で、ワープ可能なターゲットが付近に設置されるとこのレシピが自動的に選択される。すべてのワープ要求が完了またはキャンセルされると、このレシピの選択は自動的に解除される。
rabbasca-warp-sequence-building=[entity=entity-ghost]のために建物をワープインさせる。
rabbasca-warp-sequence-tile=[entity=tile-ghost]のためにタイルをワープインさせる。
rabbasca-warp-sequence-upgrade=建物をアップグレードし、交換された建物を[virtual-signal=rabbasca-warp-inventory]へ送る。
rabbasca-warp-sequence-module=モジュールやその他のアイテム要求を[entity=item-request-proxy]へワープさせる。
rabbasca-warp-sequence-reverse=解体マークが付いた建物や[entity=item-on-ground]を解体する。建物、モジュール、タイルは[virtual-signal=rabbasca-warp-inventory]へ転送され、その他のアイテムはパイロンのインベントリに入る。解体した建物内のアイテムは地面にドロップし、自動的に解体マークが付けられる。
rabbasca-security-modulation-up=[planet=rabbasca]のグローバル警戒レベル補正を10%上昇させる。この補正はハッキングされた保管庫による警戒レベルに加算され、正または負の値をとる。\n最小：-50%、最大：+50%。
rabbasca-security-modulation-down=[planet=rabbasca]のグローバル警戒レベル補正を10%低下させる。この補正はハッキングされた保管庫による警戒レベルに加算され、正または負の値をとる。\n最小：-50%、最大：+50%。
rabbasca-quality-assurance=この保管庫の品質をこのレシピの品質にアップグレードする。品質の向上にのみ機能し、保管庫と同じかそれ以下の品質で作成しても何も起こらない。\n\n実行すると付属のコンソールもアップグレードされる。進行中のハッキングは即座に中断され、保管庫の耐久値は全回復する。

