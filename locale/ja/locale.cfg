[technology-description]
bunnyhop-engine=惑星間移動の代替手段。また、[technology=harene-synthesis]を研究するまではラバスカを離れる唯一の手段でもある。\nさらなる研究により、最大距離と重量が増加する。
rabbasca-healthy-fluids=野菜を欠かさないように。
rabbasca-unhealthy-fluids=[planet=rabbasca]の地殻の下にある溶岩に何らかの方法でアクセスできれば、高度なプロセスが可能になるだろう...
interplanetary-construction=[entity=rabbasca-warp-pylon]を使用し、[item=rabbasca-warp-sequence]で建物をワープさせることで、惑星を跨いで建物を建設する。[entity=rabbasca-warp-uplink]を使用してアイテムをワープインベントリに移動させる。
rabbasca-ears-technology=[item=harene-ears-core]を設置し、[tile=rabbasca-energetic-concrete]の上に配置することで、エイリアンの技術を利用して機械の電力需要をなくす。
rabbasca-ears-technology-labs=[item=harene-ears-core]で強化された研究所は、代替エネルギー源の恩恵を受けるだけでなく、スループットもわずかに向上する。
rabbasca-ears-technology-silos=[item=harene-ears-core]を備えたサイロで建造されたロケットは、追加の推力を発生させて打ち上げ時間を短縮し、より短い間隔での連続打ち上げを可能にする。
harene-synthesis=冷却された[fluid=harenic-lava]は[fluid=harene]に精製でき、[entity=rabbasca-energy-source]を突破して脱出できるロケットを作成するのに十分な、非常に耐久性の高い素材を作成できる。
harene-infusions=微量の[fluid=harene]を食品や燃料に添加することで、その効能を劇的に向上させることができる。 

[space-location-name]
rabbasca=ラバスカ

[space-location-description]
rabbasca=岩だらけの表面を持つ、ほとんど不毛の衛星。奇妙なことに、大量の魚が生息している。地中深くから奇妙なエネルギーシグナルが放射されており、従来の発電方法に干渉している。\nエイリアンの保管庫には、ここに基地を維持するために必要な資源が眠っているかもしれない。

