[entity-description]
rabbasca-vault-crafter=古代ラバスカの保管庫。[entity=rabbasca-vault-spawner]からハッキングすると、カロテンを消費して資源を抽出できる。ハッキング中は敵の警戒レベルが上昇する。
rabbasca-energy-source=地下深くからの高出力のエネルギーシグナルによって、限定的だが安定した電力が供給されている。ただし、他の発電設備は一切機能しない。
rabbasca-vault-warp-spawner=大量の防衛部隊を呼び出すラバスカの防衛機構。非常に頑丈だが、時間の経過とともに劣化する。[entity=vault-defender-spawny]によって建設される。[item=vault-security-key]でハッキングすると[entity=rabbasca-warp-pylon]に変化する。
rabbasca-warp-pylon=[virtual-signal=rabbasca-warp-inventory]から、建設範囲内に配置されたゴーストをへワープさせる。\n[tile=rabbasca-energetic-concrete]の上にのみ設置可能。\n[entity=rabbasca-vault-warp-spawner]をハッキングすることで入手できる。
rabbasca-vault-spawner=接続された[entity=rabbasca-vault-crafter]を防衛する。[item=vault-access-key]でハッキングすると[entity=rabbasca-vault-console]に変化する。ハッキングには制限時間があるが、特定のアイテムを投入することで延長可能。
vault-defender-1=攻撃は行わないが、時折[entity=vault-distractor]を召喚して助けを求める。
vault-defender-heavy=鈍重で巨大。
vault-defender-charged=高速で致命的。
vault-defender-spawny=増援をワープさせるために[entity=rabbasca-vault-warp-spawner]を建設する。
rabbasca-vault-meltdown=メルトダウン間近！\n避難せよ！\n直ちに！
rabbasca-warp-uplink=投入されたアイテムを[virtual-signal=rabbasca-warp-inventory]へ転送するコンテナ。設置可能なアイテム（建物やタイル）とモジュールのみ転送可能。\n要求チェストとしても機能する。内部の物流セクションは[virtual-signal=rabbasca-warp-inventory]内のアイテム数を保持することができ、これを使用して要求をオフセットできる。

