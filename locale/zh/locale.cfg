[item-description]
rabbasca-turbofish=由于长时间暴露于能量场而极具营养价值。\n无论是气味还是营养价值，它们都会让你跑得非常快。
harene-ears-core=一种神秘设备，让大型机器从周围的兔子汁能场中汲取能量。\n使用此方式供电的机器必须放置在 [tile=rabbasca-energetic-concrete] 或 [tile=haronite-plate] 上。
harene-ears-subcore=一种神秘设备，让小型机器从周围的兔子汁能场中汲取能量。\n使用此方式供电的机器必须放置在 [tile=rabbasca-energetic-concrete] 或 [tile=haronite-plate] 上。
rabbasca-energetic-concrete=允许 [item=harene-ears-core] 从其辐射的兔子汁能场中汲取能量的地板材料。
machining-assembler=一种专门用于组装装配机和其他复杂机械的装配机。
bunnyhop-engine=一种允许简单星际跳跃的装置。\n一旦激活，跑动可为其充能。打开遥控视图会取消充能。\n射程和承重量可通过研究扩展。
vault-access-key=把它射入 [entity=rabbasca-vault-spawner] 以进行入侵。
vault-security-key=比 [item=vault-access-key] 更强的版本，入侵更快并且在入侵尝试中更耐用。
rabbasca-hyperjuice=显然你在发明这个时喝了太多 [item=rabbasca-protein-shake]...\n既可作为个人设备，也可喂给机器作为替代 [item=nutrients] 的燃料。
haronite-plate=极为耐用的材料。同时也是覆盖 [item=space-platform-foundation]（使用 [item=tile-upgrade-planner]）的地板，允许 [item=harene-ears-core] 从其发出的兔子汁能场中汲取能量。
rabbasca-locate-stabilizer=如果未找到稳定器，大约有 10% 的几率定位到一个稳定器。否则会始终在现有稳定器旁创建 [entity=rabbasca-warp-pylon]。
rabbasca-warp-sequence=将物品从或到 [virtual-signal=rabbasca-warp-inventory] 中跃迁。\n将根据已研究的技术（按顺序）执行以下之一：\n[recipe=rabbasca-warp-sequence-reverse]\n[recipe=rabbasca-warp-sequence-tile]\n[recipe=rabbasca-warp-sequence-building]\n[recipe=rabbasca-warp-sequence-upgrade]\n[recipe=rabbasca-warp-sequence-module]

