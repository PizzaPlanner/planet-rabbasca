[recipe-description]
rabbasca-extend-hack=显著减缓 [entity=rabbasca-vault-console] 的耐久下降，延长当前入侵。\n注意：入侵结束时，所有放在 [entity=rabbasca-vault-console] 中的物品都会丢失，可能会浪费资源。
rabbasca-remote-warmup=尝试执行所有已研究的跃迁序列中的一个。成功后，连续跃迁将显著更快。\n当附近放置了一个可跃迁目标且塔当前没有选择配方时，此配方会自动被选中。一旦所有跃迁请求完成或取消，该配方会自动取消选择。
rabbasca-warp-sequence-building=为 [entity=entity-ghost] 跃迁建筑。
rabbasca-warp-sequence-tile=为 [entity=tile-ghost] 跃迁地砖。
rabbasca-warp-sequence-upgrade=升级建筑并将被替换的建筑发送到 [virtual-signal=rabbasca-warp-inventory]。
rabbasca-warp-sequence-module=跃迁模块和其他物品到 [entity=item-request-proxy]。
rabbasca-warp-sequence-reverse=拆解被标记为拆解的建筑和 [entity=item-on-ground]。建筑、模块和地砖将被发送到 [virtual-signal=rabbasca-warp-inventory]，其他物品将进入塔的库存。被拆解建筑的内容会掉落在地上并被标注为拆解。
rabbasca-security-modulation-up=在 [planet=rabbasca] 的全局警觉修正值上提高 10%。该修正值会与被入侵保险库产生的警觉等级叠加，可为正或负。\n最小值：-50%，最大值：+50%。
rabbasca-security-modulation-down=在 [planet=rabbasca] 的全局警觉修正值上降低 10%。该修正值会与被入侵保险库产生的警觉等级叠加，可为正或负。\n最小值：-50%，最大值：+50%。
rabbasca-quality-assurance=将此保险库的质量提升到与该配方相同的质量。只能提升质量；使用低于或等于当前质量的配方不会有任何效果。\n\n这也会升级连接的控制台，立即停止当前入侵并完全修复保险库。

