[technology-description]
bunnyhop-engine=一种可替代的星际跳跃方式。另外，在研究 [technology=harene-synthesis] 之前，也是离开兔子星球的唯一方式。\n进一步研究能增加最大距离和承重量。
rabbasca-healthy-fluids=别忘喝蔬菜汁。
rabbasca-unhealthy-fluids=如果你能以某种方式得到位于 [planet=rabbasca] 地壳下的熔岩，便能实现高级加工工艺…
interplanetary-construction=使用 [entity=rabbasca-warp-pylon] 通过 [item=rabbasca-warp-sequence] 将建筑从一个星球传送到另一个星球。使用 [entity=rabbasca-warp-uplink] 将物品移入跃迁库存。
rabbasca-ears-technology=利用外星技术，安装 [item=harene-ears-core]，从而使机器不再需要常规电力供给。
rabbasca-ears-technology-labs=装有 [item=harene-ears-core] 的实验室不仅能从替代能源中获益，还能稍微提高产能。
rabbasca-ears-technology-silos=使用 [item=harene-ears-core] 装配的火箭在发射时能产生额外的推力，更快完成连续发射。
harene-synthesis=冷却后的 [fluid=harenic-lava] 可以提炼成 [fluid=harene]，用于制造足够坚固以通过 [entity=rabbasca-energy-source] 逃离的火箭材料。
harene-infusions=少量的 [fluid=haren e] 可以添加到食物和燃料中，大幅提高其效能。

[space-location-name]
rabbasca=兔子星球

[space-location-description]
rabbasca=一个大部分为荒漠的卫星，表面多岩石，但令人奇怪的是有大量鱼类分布。奇怪的能量信号从深处辐射出来，干扰常规发电方法。\n外星保险库可能包含维持这里基地所需的资源。

