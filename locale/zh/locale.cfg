bunnyhop-engine-equipment=一种允许 [entity=character] 进行短程星际跳跃的设备，但射程有限。跳跃时可携带少量物品。同时提供少量电力。\n最大射程和承重可通过进一步研究提高。\n承重上限随质量级别增加。

