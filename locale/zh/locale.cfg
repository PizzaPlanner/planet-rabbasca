[mod-setting-description]
rabbasca-cap-bunnyhop-research=移除弹跳引擎的无限研究限制，将跳跃限制为月球和近邻行星。
rabbasca-bunnyhop-force-naked=启用后在弹跳时无法携带物品，使其成为火箭筒之外的更快替代方案。\n启用此项后，导出物品离开兔子星球将变得不可能。仅在你计划将科研体系迁移到兔子星球或不需要任何兔子星球科技时使用。
rabbasca-bunnyhop-rabbasca-only=使 [item=bunnyhop-engine] 在除兔子星球外的星球无法使用。
rabbasca-evolution-per-vault=兔子星球的进化替代值由当前被入侵保险库数量乘以此百分比计算。\n值为 2.5 意味着每有 10 个保险库被入侵，兔子星球的进化为 25%。此值独立于游戏的进化设置。要在兔子星球禁用进化，请将此值设为 0。\n\n注意：游戏内显示值只会在入侵发生或入侵过期后更新。
rabbasca-show-alertness-ui=在左上角添加一个小的 UI 指示器，显示当前的警觉度水平。该指示器仅在查看兔子星球表面时可见。\n更改此项将在下一次警觉度更新或切换视图时生效。
rabbasca-surface-megawatts=兔子星球电力网络可用的功率（以兆瓦为单位）。
rabbasca-harene-easy-mode=合成 __FLUID__harene__ 需要在不同星球上的多个步骤。本设置移除某些涉及物品的星球限制。
rabbasca-no-extra-category=移除单独的兔子星球标签，物品和配方将移入现有分类。
rabbasca-ears-local-only=启用后，带有 E.A.R.S. 的建筑只能在兔子汁能场存在时建造。同时大幅减少 E.A.R.S. 子核的制作时间以作补偿。\n能量混凝土仍然可在任意星球放置。本设置不影响跃迁塔。
rabbasca-bunnyhop-cooldown=更改此设置只对之后的冷却生效，不会重置或改变正在进行的冷却。

