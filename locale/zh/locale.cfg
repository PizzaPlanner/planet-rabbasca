[tips-and-tricks-item-description]
rabbasca-briefing=[entity=rabbasca] 表面大部分为广阔的沙漠，间有肥沃地区，在那里可以发现 [entity=carotenoid-ore]。盛满 [fluid=energetic-residue] 的池塘中生活着大量 [entity=rabbasca-turbofish]，食用后可帮助快速穿越地形。\n该卫星的 [entity=rabbasca-energy-source] 提供一定的电力，但也使所有传统发电装置、[item=solar-panel] 和 [item=accumulator] 失效。你需要找到其他方式满足机器的电力需求来在此扩展基地。也许位于此处的 [entity=rabbasca-vault-crafter] 能提供实现这一点的途径。\n像空间平台那样，这里的电力网络是全局可用的。无需使用 [item=medium-electric-pole] 来连接电网，但仍可用于检测当前能量状况。
rabbasca-vaults=[entity=rabbasca-vault-crafter] 是分布在 [planet=rabbasca] 上的防御结构，包含其古代创造者留下的源源不断的物资。使用 [item=vault-access-key] 入侵可临时获得访问并禁用其防御。\n被入侵的保险库可以被指示以 [item=carotenoid-ore] 或 [fluid=beta-carotene] 交换弹出存储内容。这可以获取像 [item=iron-ore]、[item=copper-ore]、[item=calcite]、[item=sulfur] 这样的原料，并且是获得 [item=haronite] 和 [item=harene-ears-core] 的唯一途径。\n机器人防御只会对附近的军事威胁作出反应。它们不会攻击你的工厂，即使是附近采矿的 [entity=rabbascan-scrap] 也不会。\n每个 [entity=rabbasca-vault-console] 会提高全局警觉度，使得获取更多保险库变得更困难。
rabbasca-bunnyhop=[item=bunnyhop-engine] 允许 [entity=character] 在行星之间直接跳跃，无需 [entity=rocket-silo]。可携带物品，但最大重量和跳跃距离初始受限，需要进一步研究扩展。\n使用快捷键 [shortcut=activate-bunnyhop-engine] 启动发射序列，然后通过跑动为引擎充能。如果携带太多重量引擎将无法充能。\n只有直接连通的太空地点才能被跳跃，例如在 [planet=rabbasca] 上，你通常只能跳到 [planet=gleba]。\n像从 [planet=fulgora] 到 [planet=aquilo] 这样的大距离跳跃是可能的，但需要在 [technology=bunnyhop-engine-4] 中大量研究。
rabbasca-warp-inventory=将物品放入 [entity=rabbasca-warp-uplink] 可以将它们移动到 [virtual-signal=rabbasca-warp-inventory]。 [entity=rabbasca-warp-pylon] 可以使用该库存将物品跃迁进出。物品只能通过跃迁从 [virtual-signal=rabbasca-warp-inventory] 中移除。\n\n每个 [entity=rabbasca-warp-uplink] 都作为一个请求箱，并预配置了一个物流部分，包含跃迁库存当前所有物品并带有 -1 倍数。该组像普通请求箱一样 "满足" 同一物流网络中其他请求箱的请求。这个组每隔几刻会更新一次，也可以用于像 [entity=constant-combinator] 这样的机器以追踪跃迁库存的内容。\n跃迁库存有很大的容量，但并非无限。空闲库存槽数量由 [virtual-signal=signal-black] 指示。

