[entity-description]
rabbasca-vault-crafter=可以通过 [entity=rabbasca-vault-spawner] 被入侵以交换类胡萝卜素来获取资源。被入侵的保险库会增加敌方警觉等级。
rabbasca-energy-source=来自地表深处的强烈能量信号提供有限但稳定的电力，但会阻止任何其他形式的发电。
rabbasca-vault-warp-spawner=拉巴斯坎的防御机制，能在一段时间内召唤大量额外防御单位。非常强健，但会随时间退化。由 [entity=vault-defender-spawny] 构建。可用 [item=vault-security-key] 入侵以生成 [entity=rabbasca-warp-pylon]。
rabbasca-warp-pylon=在其建造半径内把放置在 [virtual-signal=rabbasca-warp-inventory] 中的幽灵（ghost）物品传送进来。\n必须放置在 [tile=rabbasca-energetic-concrete] 上。\n可通过入侵 [entity=rabbasca-vault-warp-spawner] 获得。
rabbasca-vault-spawner=保护其连接的 [entity=rabbasca-vault-crafter]。可用 [item=vault-access-key] 入侵以生成 [entity=rabbasca-vault-console]。入侵有时效，可通过插入特定物品延长。
vault-defender-1=不会主动攻击，但会偶尔召唤 [entity=vault-distractor] 求助。
vault-defender-heavy=缓慢而笨重。
vault-defender-charged=快速且致命。
vault-defender-spawny=构建 [entity=rabbasca-vault-warp-spawner] 来传送增援。
rabbasca-vault-meltdown=熔毁即将发生！\n立即撤离！\n立刻！
rabbasca-warp-uplink=一个容器，会将放入的可跃迁物品移动到 [virtual-signal=rabbasca-warp-inventory]。仅可跃迁项（建筑、地砖和模块）可被传送。\n同时作为请求箱存在，并带有一个物流部分，包含 [virtual-signal=rabbasca-warp-inventory] 中的物品计数，可用于抵消请求。

