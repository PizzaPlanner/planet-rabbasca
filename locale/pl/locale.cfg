[entity-description]
rabbasca-vault-crafter=Można go zhakować za pomocą [entity=rabbasca-vault-spawner] aby uzyskać dostęp do zasobów w zamian za karoten. Zhakowane skarbce wpływają na poziom czujności wroga.
rabbasca-energy-source=Silne sygnały energetyczne dochodzące z głębi ziemi zapewniają ograniczone, ale stabilne źródło zasilania, uniemożliwiając jednak wytwarzanie energii elektrycznej w jakikolwiek inny sposób.
rabbasca-vault-warp-spawner=Mechanizm obronny Rabbascan zdolny do teleportowania dużych ilości dodatkowych środków obronnych. Bardzo wytrzymały, ale z czasem ulega zniszczeniu. Budowany przez [entity=vault-defender-spawny]. Można go zhakować za pomocą [item=vault-security-key], aby stworzyć [entity=rabbasca-warp-pylon].
rabbasca-warp-pylon=Wypełnia duchy umieszczone w promieniu jego konstrukcji z [virtual-signal=rabbasca-warp-inventory].\nMusi być umieszczony na [tile=rabbasca-energetic-concrete].\nUzyskiwany poprzez zhakowanie [entity=rabbasca-vault-warp-spawner].
rabbasca-vault-spawner=Broni połączonego z nim [entity=rabbasca-vault-crafter]. Można go zhakować za pomocą [item=vault-access-key], aby stworzyć [entity=rabbasca-vault-console]. Hak wygasa po pewnym czasie, ale można go przedłużyć, wkładając określone przedmioty.
vault-defender-1=Nie atakuje, ale od czasu do czasu przywołuje [entity=vault-distractor] na pomoc.
vault-defender-heavy=Powolny i masywny.
vault-defender-charged=Szybki i zabójczy.
vault-defender-spawny=Tworzy [entity=rabbasca-vault-warp-spawner], aby teleportować posiłki.
rabbasca-vault-meltdown=ZBLIŻA SIĘ KATASTROFA!\nEWAKUACJA!\nNATYCHMIAST!
rabbasca-warp-uplink=Pojemnik, który przenosi umieszczone w nim przedmioty nadające się do teleportacji do [virtual-signal=rabbasca-warp-inventory]. Tylko obiekty umieszczalne (budynki i płytki) oraz moduły mogą być teleportowane.\nDziała również jako skrzynia z żądaniami i posiada sekcję logistyczną zawierającą liczbę przedmiotów w [virtual-signal=rabbasca-warp-inventory], którą można wykorzystać do zaspokojenia żądań.

