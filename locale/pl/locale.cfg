[tips-and-tricks-item-description]
rabbasca-briefing=Powierzchnia [planet=rabbasca] to rozległa pustynia z nielicznymi obszarami żyznymi, gdzie można znaleźć [entity=carotenoid-ore]. W stawach z [fluid=energetic-residue] żyją duże populacje [entity=rabbasca-turbofish], które można zjeść, aby szybciej przemieszczać się po terenie.\nKsiężycowy [entity=rabbasca-energy-source] zapewnia pewną ilość energii elektrycznej, ale sprawia również, że wszystkie twoje generatory prądu, [item=solar-panel] i [item=accumulator] stają się bezużyteczne. Będziesz musiał znaleźć inne sposoby na zaspokojenie zapotrzebowania na energię swoich maszyn, aby rozbudować tutaj swoją fabrykę. Być może znajdujące się tutaj [entity=rabbasca-vault-crafter] zapewniają sposób, aby to umożliwić.\nPodobnie jak platformy kosmiczne, sieć elektryczna jest tutaj dostępna globalnie. [item=medium-electric-pole] nie są wymagane do zasilania, ale nadal można ich używać do sprawdzania aktualnej sytuacji energetycznej.
rabbasca-vaults=[entity=rabbasca-vault-crafter] to strzeżone budowle występujące na [planet=rabbasca], zawierające nieograniczone zapasy dóbr zgromadzonych przez ich dawno zaginionych twórców. Włamanie się do nich za pomocą [item=vault-access-key] zapewnia tymczasowy dostęp i wyłącza systemy obronne.\nWłamanym skarbcom można nakazać, by wyrzuciły przechowywaną zawartość w zamian za [item=carotenoid-ore] lub [fluid=beta-carotene]. Daje to dostęp do surowców, takich jak [item=iron-ore], [item=copper-ore], [item=sulfur], i jest jedynym sposobem na zdobycie [item=haronite] oraz [item=harene-ears-core].\nSystemy obronne botów reagują wyłącznie na pobliskie zagrożenia militarne. Nigdy nie zaatakują twojej fabryki, nawet wiertnic wydobywających pobliskie [entity=rabbascan-scrap].\nKażda [entity=rabbasca-vault-console] podnosi globalny poziom czujności, wzmacniając obronę i utrudniając zabezpieczenia kolejnych skarbców.
rabbasca-bunnyhop=[item=bunnyhop-engine] pozwala [entity=character] na bezpośrednie skakanie między planetami bez potrzeby korzystania z [entity=rocket-silo]. Można zabrać ze sobą przedmioty, ale maksymalna waga i odległość skoku są początkowo ograniczone i wymagają dalszych badań.\nUżyj [shortcut=activate-bunnyhop-engine], aby rozpocząć sekwencję startową, a następnie biegaj w kółko, aby naładować silnik. Silnik nie naładuje się, jeśli przenosisz zbyt duży ciężar.\nSkakanie na duże odległości, np. z [planet=fulgora] do [planet=aquilo], jest możliwe, ale wymaga wielu badań w [technology=bunnyhop-engine-4].
rabbasca-warp-inventory=Umieść przedmioty w [entity=rabbasca-warp-uplink], aby przenieść je do [virtual-signal=rabbasca-warp-inventory]. [entity=rabbasca-warp-pylon] może korzystać z tego magazynu do przenoszenia przedmiotów do i z niego. Przedmioty można usunąć z [virtual-signal=rabbasca-warp-inventory] wyłącznie poprzez ich teleportację do niego.\n\nKażdy [entity=rabbasca-warp-uplink] działa jak skrzynia żądająca i posiada wstępnie skonfigurowaną sekcję logistyczną, która zawiera wszystkie przedmioty znajdujące się obecnie w [virtual-signal=rabbasca-warp-inventory] z mnożnikiem -1. „Zaspokaja” to żądania z dodatkowych sekcji logistycznych w taki sam sposób, jak robi to zawartość ekwipunku zwykłych skrzyń żądających. Grupa ta jest aktualizowana co kilka taktów i może być również wykorzystywana w innych maszynach, takich jak [entity=constant-combinator], do śledzenia zawartości ekwipunku teleportacyjnego.\nEkwipunek teleportacyjny ma dużą pojemność, ale nie jest nieskończony. Liczba wolnych miejsc w ekwipunku jest wskazywana przez [virtual-signal=signal-black].

