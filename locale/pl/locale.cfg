[equipment-description]
bunnyhop-engine-equipment=Urządzenie umożliwiające [entity=character], łatwe podróże międzyplanetarne, ale o ograniczonym zasięgu. Pozwala na przewożenie niewielkiej ilości przedmiotów podczas skoku. Zapewnia również niewielką ilość energii.\nMaksymalny zasięg i ładowność można zwiększyć poprzez dalsze badania.\nLimit ładowności zależy od jakości.

