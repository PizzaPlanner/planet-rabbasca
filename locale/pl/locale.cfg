energized=Energetyczny __1__
lava-spoiler=Skorupa Rabbasca jest bardzo wytrzymała, ale można ją zniszczyć. Wymaga to potężnej eksplozji, najprawdopodobniej spowodowanej przez niestabilne jądro lokalnego skarbca, odsłonięte w wyniku usunięcia jego ścian ochronnych.\nZabierzcie ze sobą najpotężniejszą broń, aby mieć szansę na pozostawienie wgniecenia, i przygotujcie się na reakcję w postaci maksymalnego globalnego alarmu.
