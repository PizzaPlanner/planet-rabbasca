[item-description]
rabbasca-turbofish=Bardzo pożywne dzięki długotrwałemu oddziaływaniu energii.\nNie wiadomo, czy to zapach, czy wartość odżywcza, ale na pewno sprawiają, że biegasz bardzo szybko.
harene-ears-core=Tajemnicze urządzenie, które pozwala dużym maszynom czerpać energię z otaczającego je pola energii harenicznej.\nMaszyny zasilane w ten sposób muszą być umieszczone na [tile=rabbasca-energetic-concrete] lub [tile=haronite-plate].
harene-ears-subcore=Tajemnicze urządzenie, które pozwala małym maszynom czerpać energię z otaczającego je pola energii harenicznej.\nMaszyny zasilane w ten sposób muszą być umieszczone na [tile=rabbasca-energetic-concrete] lub [tile=haronite-plate].
rabbasca-energetic-concrete=Podłoga, która pozwala [item=harene-ears-core] czerpać energię z emitowanego przez nią pola energii harenicznej.
machining-assembler=Maszyna montażowa specjalizująca się w montażu maszyn montażowych i innych złożonych urządzeń.
bunnyhop-engine=Urządzenie umożliwiające łatwe podróże międzyplanetarne. Po aktywacji biegaj, aby je naładować. Ładowanie można przerwać, otwierając widok zdalny. Zasięg i limity wagowe można zwiększyć poprzez badania.
vault-access-key=Wystrzel to w [entity=rabbasca-vault-spawner], aby go zhakować.
vault-security-key=Mocniejsza wersja [item=vault-access-key], włamuje się szybciej i zapewnia większą wytrzymałość podczas prób włamania.
rabbasca-hyperjuice=Najwyraźniej wypiłeś o jeden [item=rabbasca-protein-shake] za dużo, wymyślając to...\nMoże być używany zarówno jako wyposażenie osobiste, jak i podawany maszynom jako alternatywa dla [item=nutrients].
haronite-plate=Niezwykle wytrzymały materiał. Stanowi również pokrycie podłogowe dla [item=space-platform-foundation] (użyj [item=tile-upgrade-planner]), które umożliwia [item=harene-ears-core] czerpanie energii z emitowanego przez nie pola energii harenicznej.
rabbasca-locate-stabilizer=Ma około 10% szansy na zlokalizowanie stabilizatora, jeśli żaden nie został znaleziony. W przeciwnym razie zawsze utworzy [entity=rabbasca-warp-pylon] obok istniejącego stabilizatora.
rabbasca-warp-sequence=Przenosi coś do lub z [virtual-signal=rabbasca-warp-inventory].\nWykonuje jedną z poniższych czynności, w zależności od zbadanych technologii (w tej kolejności):\n [recipe=rabbasca-warp-sequence-reverse]\n[recipe=rabbasca-warp-sequence-tile]\n[recipe=rabbasca-warp-sequence-building]\n[recipe=rabbasca-warp-sequence-upgrade]\n[recipe=rabbasca-warp-sequence-module]

