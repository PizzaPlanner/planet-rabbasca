[space-location-description]
rabbasca=W większości jałowy księżyc o skalistej powierzchni, na którym, co dziwne, występuje duża populacja ryb. Z głębi ziemi promieniują dziwne sygnatury energetyczne, zakłócające konwencjonalne metody wytwarzania energii.\nObce skarbce mogą zawierać zasoby niezbędne do utrzymania bazy w tym miejscu.

