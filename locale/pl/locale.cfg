[recipe-description]
rabbasca-extend-hack=Znacznie spowalnia spadek zdrowia [entity=rabbasca-vault-console], przedłużając trwający hack.\nNależy pamiętać, że wszystkie przedmioty w [entity=rabbasca-vault-console] zostaną utracone po zakończeniu hackowania, co może spowodować marnowanie zasobów.
rabbasca-warp-sequence=Próbuje wykonać jedną ze wszystkich zbadanych sekwencji teleportacji. W przypadku powodzenia kolejne teleportacje będą znacznie szybsze.\nTen przepis jest wybierany automatycznie, gdy w pobliżu znajduje się cel, do którego można się teleportować, a pylon nie ma obecnie wybranego przepisu. Gdy wszystkie żądania teleportacji zostaną zrealizowane lub anulowane, przepis ten zostanie automatycznie odznaczony.
rabbasca-warp-sequence-building=Teleportuje się do budynków dla [entity=entity-ghost].
rabbasca-warp-sequence-tile=Teleportuje się do kafelków dla [entity=tile-ghost].
rabbasca-warp-sequence-upgrade=Modernizuje budynki i wysyła zastąpiony budynek do [virtual-signal=rabbasca-warp-inventory].
rabbasca-warp-sequence-module=Przenosi moduły i inne żądania przedmiotów do [entity=item-request-proxy].
rabbasca-warp-sequence-reverse=Rozbiera budynki i [entity=item-on-ground] oznaczone do rozbiórki. Budynki, moduły i płytki zostaną wysłane do [virtual-signal=rabbasca-warp-inventory], wszystko inne trafi do ekwipunku pylonu. Zawartość rozebranych budynków zostanie rozrzucona na ziemię i oznaczona do rozbiórki.
rabbasca-security-modulation-up=Zwiększa globalny modyfikator czujności na [planet=rabbasca] o 10%. Modyfikator jest dodawany do poziomu czujności z zhakowanych skarbców i może być dodatni lub ujemny.\nMinimum: -50%, Maksimum: +50%.
rabbasca-security-modulation-down=Zmniejsza globalny modyfikator czujności na [planet=rabbasca] o 10%. Modyfikator jest dodawany do poziomu czujności wynikającego z zhakowanych skarbców i może być dodatni lub ujemny.\nMinimum: -50%, Maksimum: +50%.
rabbasca-quality-assurance=Podnosi jakość tego skarbca do jakości określonej w tej recepturze. Można zwiększyć jedynie jakość, wytworzenie tego przy użyciu składników o niższej lub takiej samej jakości jak skarbiec nie przyniesie żadnego efektu.\n\nSpowoduje to również ulepszenie podłączonej konsoli, natychmiastowe zatrzymanie trwającego włamania oraz pełne naprawienie skarbca.
rabbasca-core-extraction-protocol=Zainicjuj samozniszczenie skarbca w celu odsłonięcia jego rdzenia.\n[color=yellow]OSTRZEŻENIE: Rdzeń jest wysoce niestabilny i prawdopodobnie spowoduje zniszczenia na rozległym obszarze. Systemy obronne Rabbascy zostaną postawione w stan najwyższej gotowości.\nPrzed kontynuowaniem podejmij odpowiednie środki ostrożności![/color]

