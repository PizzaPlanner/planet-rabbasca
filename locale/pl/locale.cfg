[technology-description]
bunnyhop-engine=Alternatywny sposób podróży międzyplanetarnych. Jednocześnie jedyna możliwość opuszczenia Rabbaski do czasu wprowadzenia technologii [technology=harene-synthesis].\nDalsze badania pozwalają zwiększyć maksymalny zasięg i ładowność.
rabbasca-healthy-fluids=Nie zapominaj o warzywach.
rabbasca-unhealthy-fluids=Gdyby udało się jakoś uzyskać dostęp do lawy znajdującej się pod skorupą [planet=rabbasca], umożliwiłoby to przeprowadzenie wysoce zaawansowanych procesów...
rabbasca-unhealthy-fluids-alt=Ogromna eksplozja mogłaby wyrwać dziurę w skorupie [planet=rabbasca], zapewniając dostęp do lawy znajdującej się poniżej. Być może [recipe=rabbasca-core-extraction-protocol] może w tym pomóc...
interplanetary-construction=Użyj [entity=rabbasca-warp-pylon], aby budować budynki na różnych planetach, przenosząc je za pomocą [item=rabbasca-warp-sequence]. Użyj [entity=rabbasca-warp-uplink], aby przenieść przedmioty do ekwipunku teleportacyjnego.
rabbasca-ears-technology=Wykorzystaj technologię obcych, aby wyeliminować zapotrzebowanie maszyn na energię, instalując [item=harene-ears-core] i umieszczając je na [tile=rabbasca-energetic-concrete].
rabbasca-ears-technology-labs=Laboratoria wzbogacone o [item=harene-ears-core] nie tylko korzystają z alternatywnego źródła energii, ale mają również nieco zwiększoną przepustowość.
rabbasca-ears-technology-silos=Rakiety produkowane w silosach z [item=harene-ears-core] mogą generować dodatkowy ciąg, startując szybciej i umożliwiając szybsze kolejne starty.
harene-synthesis=Schłodzona [fluid=harenic-lava] może zostać przetworzona na [fluid=harene], co pozwala uzyskać niezwykle wytrzymałe materiały, wystarczająco mocne, by budować rakiety zdolne do ucieczki przez [entity=rabbasca-energy-source].
harene-infusions=Niewielkie ilości [fluid=harene] można dodawać do pożywienia i paliwa, co znacznie zwiększa ich skuteczność.

