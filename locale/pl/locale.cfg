rabbasca-bunnyhop-cooldown=Czas odnowienia silnika skoku (w sekundach)
rabbasca-deconstruct-captured-pylons=Automatycznie oznaczaj przejęte pylony do rozbiórki
rabbasca-enable-new-vault-progression=Włącz nowy system odblokowywania lawy Harenicznej

[mod-setting-description]
rabbasca-cap-bunnyhop-research=Usuń możliwość nieskończonego badania skoku, ograniczając skoki wyłącznie do księżyców i pobliskich planet.
rabbasca-bunnyhop-force-naked=Uniemożliwia przenoszenie przedmiotów podczas skoków, sprowadzając je do szybszej alternatywy dla korzystania z silosu rakietowego.\nPo włączeniu tej opcji eksportowanie przedmiotów z Rabbasca będzie niemożliwe aż do późnej fazy gry. Używaj tej opcji tylko wtedy, gdy planujesz przenieść swoje zaplecze naukowe na Rabbasca lub nie potrzebujesz żadnej technologii z Rabbasca.
rabbasca-bunnyhop-rabbasca-only=Sprawia, że [item=bunnyhop-engine] nie działa na żadnej planecie poza Rabbasca.
rabbasca-evolution-per-vault=Alternatywna ewolucja Rabbasca jest obliczana poprzez pomnożenie tej wartości procentowej przez liczbę aktualnie zhakowanych skarbców.\nWartość 2,5 oznacza, że za każdym razem, gdy zhakowanych zostanie dokładnie 10 skarbców, ewolucja na Rabbasce wyniesie 25%. Wartość ta jest niezależna od ustawień ewolucji w grze. Aby wyłączyć ewolucję na Rabbasce, ustaw tę wartość na 0.\n\nNależy pamiętać, że wartość w grze zostanie zaktualizowana dopiero po zhakowaniu skarbca lub wygaśnięciu hakowania.
rabbasca-show-alertness-ui=Dodaj mały wskaźnik UI w lewym górnym rogu, pokazujący aktualny poziom czujności. Wskaźnik jest widoczny tylko podczas patrzenia na powierzchnię Rabbasca.\nZmiany tej wartości zostaną zastosowane po następnej aktualizacji czujności lub podczas patrzenia na inne powierzchnie.
rabbasca-surface-megawatts=Ilość energii dostępnej do wykorzystania w sieci energetycznej Rabbasca.
rabbasca-harene-easy-mode=Wytworzenie przedmiotu __FLUID__harene__ wymaga wykonania wielu czynności na różnych planetach. To ustawienie usuwa wymagania dotyczące warunków panujących na powierzchni w przypadku niektórych przedmiotów potrzebnych do jego wytworzenia.
rabbasca-no-extra-category=Usuwa oddzielną zakładkę Rabbasca w factoriopedii i interfejsie rzemiosła, przenosząc przedmioty i receptury do istniejących kategorii
rabbasca-ears-local-only=Gdy opcja jest aktywna, budynki z E.A.R.S. wymagają pola energii harenicznej do budowy. Znacznie skraca też czas rzemiosła dla podrdzeni E.A.R.S. w ramach rekompensaty. Energetyczny beton nadal można umieszczać na dowolnej planecie. To ustawienie nie wpływa na pylony teleportacyjne.
rabbasca-bunnyhop-cooldown=Zmiana tego ustawienia dotyczy tylko czasów odnowienia rozpoczętych później i nie resetuje ani nie zmienia trwających czasów odnowienia.
rabbasca-deconstruct-captured-pylons=Gdy opcja jest aktywna, po pomyślnym zhakowaniu __ENTITY__rabbasca-vault-warp-spawner__, powstały __ENTITY__rabbasca-warp-pylon__ zostanie oznaczony do rozbiórki.
rabbasca-enable-new-vault-progression=Nowy sposób odblokowywania lawy Harenicznej jest uzależniony od rzemiosła, a nie od walki. Poprzedni sposób powodował wiele nieporozumień i powodował pewne problemy z kompatybilnością z innymi modami związanymi z walką. Sprawdź technologię niezdrowych płynów, aby uzyskać więcej informacji.

