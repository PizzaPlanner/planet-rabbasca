[recipe-description]
rabbasca-extend-hack=Significantly slows down health deterioration of [entity=rabbasca-vault-console], extending the ongoing hack.\nNote that all items in [entity=rabbasca-vault-console] will be lost once the hack ends, potentially wasting resources.
rabbasca-remote-warmup=Attempts to perform one of all researched warp sequences. On success, consecutive warps will be significantly faster.\nThis recipe is auto-selected once there is a warpable target is placed nearby if the pylon currently has no recipe selected. Once all warp requests have been completed or canceled, this recipe wil de-select itself automatically.
rabbasca-warp-sequence-building=Warps in buildings for [entity=entity-ghost].
rabbasca-warp-sequence-tile=Warps in tiles for [entity=tile-ghost].
rabbasca-warp-sequence-upgrade=Upgrades buildings and sends the replaced building to [virtual-signal=rabbasca-warp-inventory].
rabbasca-warp-sequence-module=Warps modules and other item requests into [entity=item-request-proxy].
rabbasca-warp-sequence-reverse=Deconstructs buildings and sends them to [virtual-signal=rabbasca-warp-inventory]. Contents will be spilled to the ground.
rabbasca-security-modulation-up=Raises global alertness modifier on [planet=rabbasca] by 10%. The modifier is added to the alertness level from hacked vaults and can be positive or negative.\nMinimum: -50%, Maximum: +50%.
rabbasca-security-modulation-down=Reduces global alertness modifier on [planet=rabbasca] by 10%. The modifier is added to the alertness level from hacked vaults and can be positive or negative.\nMinimum: -50%, Maximum: +50%.
rabbasca-locate-stabilizer=Search rabbascan archives to locate a [space-location=rabbasca-underground]. With a location verified, further crafts will place [entity=rabbasca-warp-pylon] in the stabilizer's vicinity and allow you to establish a base around it.
rabbasca-change-affinity=[entity=rabbasca-warp-pylon] can use [item=rabbasca-warp-matrix] to warp in items from the attuned location. [entity=rabbasca-warp-stabilizer] can only be attuned to one location at the same time.
rabbasca-attuned-materialize=Requires [entity=rabbasca-warp-stabilizer] attuned to [space-location=__1__]. Uses [item=rabbasca-warp-matrix] to locate matter somewhere on [space-location=__1__].\n\n(This operation does not involve [virtual-signal=rabbasca-warp-inventory])

